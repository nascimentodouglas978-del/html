    <title>Listas em HTML 5</title>
</head>
<body>
    <h1>Listas em HTML 5</h1>
    <h3>Lista não Ordenada</h3>
    <ul>
        <li>Pão</li>
        <li>Leite</li>
        <li>Café</li>
        <li>Bolacha</li>
    <ul>
<h3>Lista Ordenada</h3>
<ol>

    <li>Passar o condicionador</li>

</ol>
</body>
